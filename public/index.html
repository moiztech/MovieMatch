<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieMatch – Discover Movies</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">MOVIEMATCH</a>
    <div class="nav-links">
      <a href="index.html" data-page="home" class="active">Home</a>
      <a href="battle.html" data-page="battle">Movie Battle</a>
      <a href="admin.html" data-page="admin">Analytics</a>
    </div>
  </nav>

  <header class="hero">
    <h1>Find Your Next Favorite Film</h1>
    <p>Browse trending hits, search by actor or director, and get smart recommendations.</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by movie, actor, director, genre...">
      <button class="btn" id="searchBtn">Search</button>
    </div>
  </header>

  <main>
    <div class="genre-chips" id="genreChips"></div>

    <section class="section hidden" id="searchResultsSection">
      <div class="section-header">
        <h2>Search Results</h2>
      </div>
      <div class="movie-grid" id="searchResults"></div>
    </section>

    <section class="section">
      <div class="section-header"><h2>🔥 Trending Now</h2></div>
      <div class="movie-grid" id="trendingGrid"><p class="loading">Loading...</p></div>
    </section>

    <section class="section">
      <div class="section-header"><h2>⭐ Top Rated</h2></div>
      <div class="movie-grid" id="topRatedGrid"></div>
    </section>

    <section class="section">
      <div class="section-header"><h2>🆕 Recently Added</h2></div>
      <div class="movie-grid" id="recentGrid"></div>
    </section>

    <section class="section">
      <div class="section-header"><h2>🎬 All Movies</h2></div>
      <div class="movie-grid" id="allMoviesGrid"></div>
    </section>
  </main>

  <footer>MovieMatch – University Database Project</footer>
  <script src="js/main.js"></script>
  <script>
    setActiveNav('home');

    async function loadHome() {
      const [trending, topRated, recent, genres, all] = await Promise.all([
        fetchJSON('/api/trending'),
        fetchJSON('/api/top-rated'),
        fetchJSON('/api/recent'),
        fetchJSON('/api/genres'),
        fetchJSON('/api/movies'),
      ]);
      renderGrid(document.getElementById('trendingGrid'), trending);
      renderGrid(document.getElementById('topRatedGrid'), topRated);
      renderGrid(document.getElementById('recentGrid'), recent);
      renderGrid(document.getElementById('allMoviesGrid'), all);

      const chips = document.getElementById('genreChips');
      chips.innerHTML = '<span class="chip active" data-genre="">All</span>' +
        genres.map((g) => `<span class="chip" data-genre="${g.name}">${g.name}</span>`).join('');

      chips.addEventListener('click', async (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        chips.querySelectorAll('.chip').forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
        const genre = chip.dataset.genre;
        const section = document.getElementById('searchResultsSection');
        section.classList.remove('hidden');
        if (!genre) {
          renderGrid(document.getElementById('searchResults'), all);
          document.querySelector('#searchResultsSection h2').textContent = 'All Movies';
        } else {
          const movies = await fetchJSON('/api/movies/genre/' + encodeURIComponent(genre));
          renderGrid(document.getElementById('searchResults'), movies);
          document.querySelector('#searchResultsSection h2').textContent = genre + ' Movies';
        }
      });
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const movies = await fetchJSON('/api/search?q=' + encodeURIComponent(q));
      document.getElementById('searchResultsSection').classList.remove('hidden');
      document.querySelector('#searchResultsSection h2').textContent = 'Search: "' + q + '"';
      renderGrid(document.getElementById('searchResults'), movies);
    }

    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    loadHome().catch(() => {
      document.getElementById('trendingGrid').innerHTML =
        '<p class="empty">Cannot connect to server. Run: npm start</p>';
    });
  </script>
</body>
</html>
